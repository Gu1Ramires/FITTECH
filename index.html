<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTech - Predição de Queima Calórica</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d1117; color: #c9d1d9; text-align: center; padding: 50px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 8px; display: inline-block; }
        input { padding: 12px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 10px; }
        button { padding: 12px 24px; background-color: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:disabled { background-color: #213325; cursor: not-allowed; }
        #status { color: #8b949e; margin: 15px 0; font-size: 0.9rem; }
        #resultado { color: #58a6ff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Calculadora Fitness IA</h1>
        <p>Preveja quantas calorias você vai queimar com base no tempo de treino.</p>

        <input type="number" id="minutosTreino" placeholder="Minutos de exercício">
        <button id="btnCalcular" onclick="executarIA()">Calcular Gasto</button>

        <div id="status">Status: Aguardando entrada...</div>
        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
